---
- name: Configure Development Environment
  hosts: localhost
  connection: local

  vars:
    # Overridden by --extra-vars from run_after_apply.sh.tmpl (chezmoi .isWorkMachine).
    # Defaults to a personal machine when run manually without the flag.
    is_work_machine: false
    # On a CI-managed dev box, an external Ansible (homelab-vsphere) owns every
    # package install. This layer then does ONLY env/shell/Bitwarden — every
    # package-install role below is gated off — so the two never install
    # conflicting versions (e.g. native vs npm Claude Code).
    is_dev_box: false

  tasks:
    - name: Ensure ~/.local/bin exists
      file:
        path: "{{ ansible_facts.env.HOME }}/.local/bin"
        state: directory
        mode: '0755'

  roles:
    # Package-install roles — skipped on CI-managed dev boxes (is_dev_box).
    - role: system_packages
      when: not (is_dev_box | bool)
    - role: uv
      when: not (is_dev_box | bool)
    - role: homebrew
      when: not (is_dev_box | bool)
    - role: nodejs
      when: not (is_dev_box | bool)
    - role: claude_code
      when: not (is_dev_box | bool)
    - role: aws_cli
      when: not (is_dev_box | bool)
    - role: opencode
      when: not (is_dev_box | bool)
    # Env / shell / secrets — always run (this is the dotfiles' job on every box).
    - starship
    - bitwarden_cli
    - antidote
    # A CI-managed dev/agent box gets NO lab-wide secret access: it runs agents,
    # it never deploys infrastructure (CI does). So no bws client here, and
    # BWS_ACCESS_TOKEN is withheld from exports.zsh on such a box.
    - role: bws
      when:
        - not (is_work_machine | bool)
        - not (is_dev_box | bool)

  post_tasks:
    - name: Check if default shell is zsh
      command: echo $SHELL
      register: current_shell
      changed_when: false

    - name: Change default shell to zsh (Linux only)
      user:
        name: "{{ ansible_facts.env.USER }}"
        shell: /usr/bin/zsh
      become: yes
      when:
        - current_shell.stdout != '/usr/bin/zsh'
        - ansible_facts['os_family'] != 'Darwin'
      # macOS: chsh is restricted on managed Macs; /bin/zsh is the default and works fine
      # To change manually: chsh -s /opt/homebrew/bin/zsh
