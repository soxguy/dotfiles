---
- name: Configure Development Environment
  hosts: localhost
  connection: local

  tasks:
    - name: Ensure ~/.local/bin exists
      file:
        path: "{{ ansible_facts.env.HOME }}/.local/bin"
        state: directory
        mode: '0755'

  roles:
    - system_packages
    - starship
    - bitwarden_cli
    - uv
    - homebrew
    - nodejs
    - claude_code
    - antidote
    - aws_cli
    - opencode
    - second_brain

  post_tasks:
    - name: Check if default shell is zsh
      command: echo $SHELL
      register: current_shell
      changed_when: false

    - name: Change default shell to zsh (Linux only)
      user:
        name: "{{ ansible_facts.env.USER }}"
        shell: /usr/bin/zsh
      become: yes
      when:
        - current_shell.stdout != '/usr/bin/zsh'
        - ansible_facts['os_family'] != 'Darwin'
      # macOS: chsh is restricted on managed Macs; /bin/zsh is the default and works fine
      # To change manually: chsh -s /opt/homebrew/bin/zsh
