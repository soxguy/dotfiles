---
- name: Check if Node.js is installed
  command: which node
  register: node_check
  changed_when: false
  failed_when: false

- name: Add NodeSource repository (Linux)
  shell: |
    curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
  become: yes
  when:
    - node_check.rc != 0
    - ansible_os_family != "Darwin"

- name: Install Node.js (Linux)
  apt:
    name: nodejs
    state: present
  become: yes
  when:
    - node_check.rc != 0
    - ansible_os_family != "Darwin"

- name: Install Node.js (macOS)
  community.general.homebrew:
    name: node
    state: present
  when:
    - node_check.rc != 0
    - ansible_os_family == "Darwin"

- name: Check for NPM version of Claude Code
  command: npm list -g @anthropics/claude-code
  register: npm_claude_check
  changed_when: false
  failed_when: false

- name: Remove NPM version of Claude Code if present
  npm:
    name: '@anthropics/claude-code'
    global: yes
    state: absent
  become: "{{ ansible_os_family != 'Darwin' }}"
  when: npm_claude_check.rc == 0
