---
# Linux: install Linuxbrew if not present
- name: Ensure Homebrew dependencies are installed (Linux)
  apt:
    name:
      - build-essential
      - curl
      - git
      - tar
    state: present
  become: yes
  when: ansible_os_family != "Darwin"

- name: Check if Linuxbrew is installed
  stat:
    path: /home/linuxbrew/.linuxbrew/bin/brew
  register: brew_stat
  when: ansible_os_family != "Darwin"

- block:
  - name: Create Homebrew directory
    file:
      path: /home/linuxbrew/.linuxbrew
      state: directory
      owner: "{{ ansible_facts.env.USER }}"
      group: "{{ ansible_facts.env.USER }}"
      mode: '0755'
    become: yes

  - name: Install Homebrew (Linuxbrew)
    shell: |
      curl -fsSL https://github.com/Homebrew/brew/tarball/master | tar xz --strip 1 -C /home/linuxbrew/.linuxbrew

  when:
    - ansible_os_family != "Darwin"
    - not brew_stat.stat.exists
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_facts.env.PATH }}"

# Both platforms: install packages via Homebrew
- name: Set brew binary path
  set_fact:
    brew_bin: "{{ '/opt/homebrew/bin/brew' if ansible_os_family == 'Darwin' else '/home/linuxbrew/.linuxbrew/bin/brew' }}"

- name: Install Homebrew packages
  community.general.homebrew:
    name:
      - rtk
    state: present
  environment:
    PATH: "{{ brew_bin | dirname }}:{{ ansible_facts.env.PATH }}"
